<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <title>StockExt 状态</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      width: 280px;
      padding: 16px;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif;
      font-size: 13px;
      color: #222;
      background: #fff;
    }
    h1 {
      font-size: 15px;
      margin-bottom: 12px;
      padding-bottom: 8px;
      border-bottom: 1px solid #e5e5e5;
    }
    .row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 6px 0;
      border-bottom: 1px solid #f0f0f0;
    }
    .row:last-child { border-bottom: none; }
    .label { color: #666; }
    .value { font-weight: 600; }
    .status-ok   { color: #16a34a; }
    .status-warn { color: #ca8a04; }
    .status-err  { color: #dc2626; }
    .status-idle { color: #666; }
    .footer {
      margin-top: 10px;
      padding-top: 8px;
      border-top: 1px solid #e5e5e5;
      font-size: 11px;
      color: #999;
      text-align: right;
    }
  </style>
</head>
<body>
  <h1>StockExt 状态</h1>

  <div class="row">
    <span class="label">本地服务</span>
    <span id="local-status" class="value">未连接</span>
  </div>
  <div class="row">
    <span class="label">DeepSeek 页面</span>
    <span id="deepseek-status" class="value">未找到</span>
  </div>
  <div class="row">
    <span class="label">当前任务</span>
    <span id="task-status" class="value">空闲</span>
  </div>
  <div class="row">
    <span class="label">最近错误</span>
    <span id="last-error" class="value">无</span>
  </div>
  <div class="row">
    <span class="label">最近耗时</span>
    <span id="last-duration" class="value">-</span>
  </div>

  <div class="footer">
    更新于 <span id="last-updated">-</span>
  </div>

  <script src="popup.js"></script>
</body>
</html>
